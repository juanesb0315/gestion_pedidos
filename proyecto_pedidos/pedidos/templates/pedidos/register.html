{% extends 'base.html' %}

{% block content %}

<section class="auth-wrap">
    <div class="panel-crud vista-contenedor auth-card">
        <div class="card-header encabezado-crud vista-cabecera auth-header">
            <span class="auth-icon"><i class="bi bi-person-plus"></i></span>
            <h1 class="auth-title">Crear cuenta</h1>
            <p class="auth-subtitle">Registra tus datos para comenzar</p>
        </div>
        <div class="card-body vista-cuerpo">
            <form method="post">
                {% csrf_token %}

                <div class="auth-campos">
                    <div class="auth-campo">
                        <label class="form-label">Usuario</label>
                        <input type="text" name="username" value="{{ username|default:'' }}" class="form-control" placeholder="Nombre de usuario" required>
                    </div>
                    <div class="auth-campo">
                        <label class="form-label">Email</label>
                        <input type="email" name="email" value="{{ email|default:'' }}" class="form-control" placeholder="Correo" required>
                    </div>
                    <div class="auth-campo">
                        <label class="form-label">Contrasena</label>
                        <input type="password" name="password" class="form-control" placeholder="Contrasena" required>
                    </div>
                    <div class="auth-campo">
                        <label class="form-label">Confirmar contrasena</label>
                        <input type="password" name="confirm_password" class="form-control" placeholder="Repite contrasena" required>
                    </div>
                </div>

                {% if errors %}
                    <div class="alert alert-danger py-2" style="background: rgba(193, 45, 45, 0.18); border-color: rgba(255, 165, 165, 0.35); color: #ffd9d9;">
                        <ul class="mb-0">
                            {% for err in errors %}
                                <li>{{ err }}</li>
                            {% endfor %}
                        </ul>
                    </div>
                {% endif %}

                <div class="auth-acciones">
                    <div class="d-grid mb-2">
                        <button type="submit" class="btn btn-guardar-crud"><i class="bi bi-check2-circle me-1"></i>Registrar</button>
                    </div>
                    <div class="text-center small">
                        <a href="{% url 'login' %}" class="link-accion">Ya tienes cuenta? Iniciar sesion</a>
                    </div>
                </div>
            </form>
        </div>
    </div>
</section>

{% endblock %}
