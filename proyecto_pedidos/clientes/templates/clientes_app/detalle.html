{% extends 'base.html' %}

{% block content %}
<section class="panel-crud vista-contenedor fixed-list-card">
    <div class="card-header encabezado-crud vista-cabecera">
        <h5 class="mb-0 fw-semibold">Detalle de Cliente #{{ registro_cliente.id }}</h5>
        <a href="{% url 'listar_clientes' %}" class="btn btn-sm btn-crear-crud">
            <i class="bi bi-arrow-left"></i> Volver
        </a>
    </div>

    <div class="card-body vista-cuerpo">
        <div class="row g-3">
            <div class="col-md-6">
                <div class="small text-muted">Nombre</div>
                <div class="fw-medium">{{ registro_cliente.nombre }}</div>
            </div>
            <div class="col-md-6">
                <div class="small text-muted">Correo</div>
                <div>{{ registro_cliente.correo }}</div>
            </div>
            <div class="col-md-6">
                <div class="small text-muted">Telefono</div>
                <div>{{ registro_cliente.telefono }}</div>
            </div>
            <div class="col-md-6">
                <div class="small text-muted">Direccion</div>
                <div>{{ registro_cliente.direccion }}</div>
            </div>
            <div class="col-md-12 mt-3">
                <a href="{% url 'editar_cliente' registro_cliente.id %}" class="btn btn-sm btn-primary">
                    <i class="bi bi-pencil"></i> Editar cliente
                </a>
            </div>
        </div>
    </div>
</section>
{% endblock %}
